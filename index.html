<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geotech Calculation Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">Engineering Calculation Tool</h2>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">UTM Coordinate Converter</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-5">
                        <input type="number" id="lat" class="form-control" placeholder="Latitude (e.g., 27.21)">
                    </div>
                    <div class="col-md-5">
                        <input type="number" id="lon" class="form-control" placeholder="Longitude (e.g., 89.50)">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" onclick="convertCoords()">Convert</button>
                    </div>
                </div>
                <div id="coordResult" class="mt-3 p-3 bg-light rounded d-none"></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">Reference: Bond Stress (MPa)</div>
            <div class="card-body">
                <p class="text-muted small">Based on rock-grout interface standards.</p>
                <table class="table table-hover">
                    <thead><tr><th>Rock Type</th><th>MPa Range</th></tr></thead>
                    <tbody>
                        <tr><td>Granite, Basalt</td><td>0.55 – 1.00</td></tr>
                        <tr><td>Sandstone</td><td>0.30 – 0.60</td></tr>
                        <tr><td>Weak Shales</td><td>0.05 – 0.30</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/utm-latlng@1.0.8/UTMLatLngFront.min.js"></script>
    <script>
        function convertCoords() {
            const utm = new UTMLatLng();
            const lat = document.getElementById('lat').value;
            const lon = document.getElementById('lon').value;
            
            if(!lat || !lon) return alert("Please enter both values");

            const res = utm.convertLatLngToUtm(lat, lon, 2);
            const display = document.getElementById('coordResult');
            display.classList.remove('d-none');
            display.innerHTML = `
                <strong>Easting:</strong> ${res.Easting.toFixed(2)} m<br>
                <strong>Northing:</strong> ${res.Northing.toFixed(2)} m<br>
                <strong>UTM Zone:</strong> ${res.ZoneNumber}${res.ZoneLetter}
            `;
        }
    </script>
</body>
</html>
